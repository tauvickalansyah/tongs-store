<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tongs</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Midtrans -->
    <script src="https://app.sandbox.midtrans.com/snap/snap.js"
        data-client-key="Mid-client-h2kYk3NKZ4Cv9eP7"></script>

    <style>
        :root {
            --bg-color: #f9fafb;
            --surface-color: #ffffff;
            --primary-color: #7c3aed;
            --primary-hover: #6d28d9;
            --text-main: #111827;
            --text-secondary: #6b7280;
            --gray-light: #e5e7eb;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 0 20px;
        }

        /* NAVBAR */
        nav {
            height: 70px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gray-light);
            z-index: 1000;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-outline {
            border: 1px solid var(--gray-light);
            background: white;
        }

        /* HERO */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 80px 0;
            align-items: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .hero img {
            width: 100%;
            border-radius: 20px;
        }

        /* CARD */
        .card {
            background: var(--surface-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .features {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            padding: 60px 0;
        }

        /* PRODUCT */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
            gap: 30px;
        }

        .product-card img {
            width: 100%;
            border-radius: 12px;
        }

        .price {
            color: var(--primary-color);
            font-weight: bold;
            margin: 10px 0;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            background: rgba(0,0,0,0.4);
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--gray-light);
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            text-align: center;
            color: var(--text-secondary);
        }

        @media(max-width:768px){
            .hero{
                grid-template-columns:1fr;
            }
            .nav-links{
                display:none;
            }
        }
    </style>
</head>

<body>

<nav>
    <div class="container nav-content">
        <div class="logo">Tongs</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#products">Produk</a></li>
            <li><a href="#faq">FAQ</a></li>
        </ul>
        <div>
            <a href="#products" class="btn btn-primary">Belanja</a>
        </div>
    </div>
</nav>

<section class="container hero">
    <div>
        <h1>Produk Digital Berkualitas</h1>
        <p style="color: var(--text-secondary); margin-bottom:20px;">
            Solusi cepat untuk kebutuhan digital Anda.
        </p>
        <a href="#products" class="btn btn-primary">Lihat Produk</a>
    </div>
    <img src="https://placehold.net/default.png">
</section>

<section class="container features">
    <div class="card">Produk Berkualitas</div>
    <div class="card">Akses Selamanya</div>
    <div class="card">Hemat & Praktis</div>
</section>

<section class="container" id="products">
    <h2>Produk</h2>
    <br>
    <div class="products-grid">
        <div class="card product-card">
            <img src="https://placehold.net/default.png">
            <h3>Kopi Digital</h3>
            <div class="price">Rp 50.000</div>
            <button class="btn btn-primary btn-buy" data-name="Kopi" data-price="50000">Beli</button>
        </div>

        <div class="card product-card">
            <img src="https://placehold.net/default.png">
            <h3>Keripik Digital</h3>
            <div class="price">Rp 75.000</div>
            <button class="btn btn-primary btn-buy" data-name="Keripik" data-price="75000">Beli</button>
        </div>
    </div>
</section>

<!-- MODAL -->
<div class="modal" id="checkoutModal">
    <div class="modal-content">
        <h3 id="displayItem"></h3>

        <form id="payForm">
            <input type="hidden" id="order_id">
            <input type="hidden" id="amount">

            <input type="email" id="email" placeholder="Email" required>
            <input type="text" id="phone" placeholder="Nomor HP" required>

            <button class="btn btn-primary">Bayar</button>
        </form>
    </div>
</div>

<footer>
    <p>© 2026 Tongs</p>
</footer>

<script>
const modal = document.getElementById("checkoutModal");

document.querySelectorAll(".btn-buy").forEach(btn=>{
    btn.onclick=()=>{
        modal.style.display="flex";

        document.getElementById("displayItem").innerText =
        btn.dataset.name + " - Rp " + btn.dataset.price;

        document.getElementById("amount").value = btn.dataset.price;
        document.getElementById("order_id").value = "DE-"+Date.now();
    }
});

window.onclick=(e)=>{
    if(e.target==modal) modal.style.display="none";
};

document.getElementById("payForm").onsubmit=async(e)=>{
    e.preventDefault();

    const payload={
        transaction_details:{
            order_id:document.getElementById("order_id").value,
            gross_amount:parseInt(document.getElementById("amount").value)
        }
    };

    const res=await fetch("https://corsproxy.io/https://app.sandbox.midtrans.com/snap/v1/transactions",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Basic "+btoa("Mid-server-ISI_SERVER_KEY_ANDA:")
        },
        body:JSON.stringify(payload)
    });

    const data=await res.json();

    if(data.token){
        window.snap.pay(data.token);
    }
};
</script>

</body>
</html>
